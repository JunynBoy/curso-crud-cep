<?xml version="1.0" encoding="UTF-8" ?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	template="/WEB-INF/templates/layout.xhtml">

	<ui:define name="title">Buscar unidades | CepSystem</ui:define>

	<ui:define name="content">
		<section class="page-heading">
			<div class="page-heading-copy">
				<p class="eyebrow">Busca</p>
				<h1>Consultar unidades</h1>
			</div>

			<div class="page-actions">
				<h:link outcome="/paginas/Cadastro" styleClass="button button-page-primary">
					<span class="pi pi-plus" aria-hidden="true"></span>
					<span>Cadastrar unidade</span>
				</h:link>
			</div>
		</section>

		<section class="single-column">
			<p:card styleClass="surface-card">
				<h:form id="buscaForm">
					<div class="search-bar">
						<p:inputText id="termoBusca"
							value="#{unidadeDeSaudeMB.termoBusca}"
							placeholder="Nome, CNES ou CEP" />

						<p:commandButton value="Buscar"
							icon="pi pi-search"
							action="#{unidadeDeSaudeMB.buscar}"
							update=":messages :buscaForm :conteudoConsulta"
							process="@form"
							styleClass="ui-button-success" />

						<p:commandButton value="Limpar"
							icon="pi pi-times"
							action="#{unidadeDeSaudeMB.limparBusca}"
							update=":messages :buscaForm :conteudoConsulta"
							process="@this"
							rendered="#{unidadeDeSaudeMB.buscaAtiva}"
							styleClass="ui-button-secondary ui-button-outlined" />

						<p:commandButton value="Gerar relatorio"
							icon="pi pi-file-pdf"
							action="#{unidadeDeSaudeMB.gerarRelatorioAction}"
							ajax="false"
							onclick="this.form.target='_blank'"
							styleClass="ui-button-secondary" />
					</div>
				</h:form>
			</p:card>

			<h:panelGroup id="conteudoConsulta" layout="block">
				<p:card styleClass="surface-card" rendered="#{unidadeDeSaudeMB.buscaAtiva}">
					<h:form id="resultadoForm">
						<h2>Resultado da busca</h2>
						<p:dataTable id="tabelaResultado"
							value="#{unidadeDeSaudeMB.resultados}"
							var="ur"
							rows="8"
							paginator="true"
							emptyMessage="Nenhum resultado encontrado.">
							<p:column headerText="ID" styleClass="id-column">
								<h:outputText value="#{ur.id}" />
							</p:column>
							<p:column headerText="Nome do estabelecimento">
								<h:outputText value="#{ur.nomeEstabelecimento}" />
							</p:column>
							<p:column headerText="CEP inicial">
								<h:outputText value="#{ur.cepInicio}" />
							</p:column>
							<p:column headerText="CEP final">
								<h:outputText value="#{ur.cepFinal}" />
							</p:column>
							<p:column headerText="CNES">
								<h:outputText value="#{ur.cnes}" />
							</p:column>
						</p:dataTable>
					</h:form>
				</p:card>

				<p:card styleClass="surface-card" rendered="#{not unidadeDeSaudeMB.buscaAtiva}">
					<h:form id="todosForm">
						<h2>Todos os cadastros</h2>
						<p:dataTable id="tabelaTodos"
							value="#{unidadeDeSaudeMB.unidades}"
							var="u"
							paginator="true"
							rows="8"
							emptyMessage="Nenhuma unidade cadastrada.">
							<p:column headerText="ID" styleClass="id-column">
								<h:outputText value="#{u.id}" />
							</p:column>
							<p:column headerText="Nome do estabelecimento">
								<h:outputText value="#{u.nomeEstabelecimento}" />
							</p:column>
							<p:column headerText="CEP inicial">
								<h:outputText value="#{u.cepInicio}" />
							</p:column>
							<p:column headerText="CEP final">
								<h:outputText value="#{u.cepFinal}" />
							</p:column>
							<p:column headerText="CNES">
								<h:outputText value="#{u.cnes}" />
							</p:column>
						</p:dataTable>
					</h:form>
				</p:card>
			</h:panelGroup>
		</section>
	</ui:define>
</ui:composition>
