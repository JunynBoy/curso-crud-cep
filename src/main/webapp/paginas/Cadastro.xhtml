<?xml version="1.0" encoding="UTF-8" ?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	template="/WEB-INF/templates/layout.xhtml">

	<ui:define name="title">Cadastrar unidade | CepSystem</ui:define>

	<ui:define name="content">
		<section class="page-heading">
			<div class="page-heading-copy">
				<p class="eyebrow">Cadastro</p>
			<h1>Unidades de saúde</h1>
			</div>

			<div class="page-actions">
				<h:link outcome="/paginas/Buscar" styleClass="button button-page-secondary">
					<span class="pi pi-search" aria-hidden="true"></span>
					<span>Consultar unidades</span>
				</h:link>
			</div>
		</section>

		<section class="workspace-grid">
			<p:card styleClass="surface-card form-card">
				<h:form id="cadastroForm">
					<h2>Nova unidade</h2>

					<p:panelGrid columns="2" layout="grid" styleClass="form-grid ui-fluid">
						<p:outputLabel for="nome" value="Nome da unidade" />
						<p:inputText id="nome"
							value="#{unidadeDeSaudeMB.unidadeSaude.nomeEstabelecimento}"
							required="true"
							requiredMessage="Informe o nome da unidade." />

						<p:outputLabel for="cnes" value="CNES" />
						<p:inputText id="cnes"
							value="#{unidadeDeSaudeMB.unidadeSaude.cnes}"
							maxlength="7"
							required="true"
							requiredMessage="Informe o CNES." />

						<p:outputLabel for="cepInicio" value="CEP inicial" />
						<p:inputMask id="cepInicio"
							mask="99999-999"
							value="#{unidadeDeSaudeMB.unidadeSaude.cepInicio}"
							required="true"
							requiredMessage="Informe o CEP inicial." />

						<p:outputLabel for="cepFinal" value="CEP final" />
						<p:inputMask id="cepFinal"
							mask="99999-999"
							value="#{unidadeDeSaudeMB.unidadeSaude.cepFinal}"
							required="true"
							requiredMessage="Informe o CEP final." />
					</p:panelGrid>

					<div class="form-actions">
						<p:commandButton value="Cadastrar"
							icon="pi pi-save"
							action="#{unidadeDeSaudeMB.adicionar}"
							update=":messages :cadastroForm :listagemForm"
							styleClass="ui-button-success" />
					</div>
				</h:form>
			</p:card>

			<p:card styleClass="surface-card table-card">
				<h:form id="listagemForm">
					<h2>Cadastros</h2>

					<p:dataTable id="tabela"
						value="#{unidadeDeSaudeMB.unidades}"
						var="u"
						paginator="true"
						rows="8"
						emptyMessage="Nenhuma unidade cadastrada.">
						<p:column headerText="ID" styleClass="id-column">
							<h:outputText value="#{u.id}" />
						</p:column>
						<p:column headerText="Nome do estabelecimento">
							<h:outputText value="#{u.nomeEstabelecimento}" />
						</p:column>
						<p:column headerText="CEP inicial">
							<h:outputText value="#{u.cepInicio}" />
						</p:column>
						<p:column headerText="CEP final">
							<h:outputText value="#{u.cepFinal}" />
						</p:column>
						<p:column headerText="CNES">
							<h:outputText value="#{u.cnes}" />
						</p:column>
						<p:column headerText="Ações" styleClass="actions-column">
							<p:commandButton id="alterar"
								icon="pi pi-pencil"
								title="Editar"
								styleClass="ui-button-secondary ui-button-outlined action-button"
								update=":listagemForm:panelChangeUnidade"
								process="@this"
								actionListener="#{unidadeDeSaudeMB.carregaUnidade(u)}"
								oncomplete="PF('alterarUnidadeDlg').show()" />

							<p:commandButton id="excluir"
								icon="pi pi-trash"
								title="Excluir"
								action="#{unidadeDeSaudeMB.excluir(u)}"
								styleClass="ui-button-danger ui-button-outlined action-button"
								update=":messages :cadastroForm :listagemForm"
								process="@this">
								<p:confirm type="popup"
									header="Confirmação"
									message="Deseja remover este cadastro?"
									icon="pi pi-info-circle" />
							</p:commandButton>
						</p:column>
					</p:dataTable>

					<p:dialog header="Alterar unidade"
						widgetVar="alterarUnidadeDlg"
						modal="true"
						responsive="true"
						width="480"
						showEffect="fade">
						<p:panelGrid id="panelChangeUnidade" columns="2" layout="grid" styleClass="form-grid ui-fluid">
							<p:outputLabel for="nomeEdicao" value="Nome da unidade" />
							<p:inputText id="nomeEdicao"
								value="#{unidadeDeSaudeMB.unidadeSaudeUpdate.nomeEstabelecimento}"
								required="true"
								requiredMessage="Informe o nome da unidade." />

							<p:outputLabel for="cnesEdicao" value="CNES" />
							<p:inputText id="cnesEdicao"
								value="#{unidadeDeSaudeMB.unidadeSaudeUpdate.cnes}"
								maxlength="7"
								required="true"
								requiredMessage="Informe o CNES." />

							<p:outputLabel for="cepInicioEdicao" value="CEP inicial" />
							<p:inputMask id="cepInicioEdicao"
								mask="99999-999"
								value="#{unidadeDeSaudeMB.unidadeSaudeUpdate.cepInicio}"
								required="true"
								requiredMessage="Informe o CEP inicial." />

							<p:outputLabel for="cepFinalEdicao" value="CEP final" />
							<p:inputMask id="cepFinalEdicao"
								mask="99999-999"
								value="#{unidadeDeSaudeMB.unidadeSaudeUpdate.cepFinal}"
								required="true"
								requiredMessage="Informe o CEP final." />
						</p:panelGrid>

						<div class="form-actions">
							<p:commandButton value="Salvar alterações"
								icon="pi pi-check"
								action="#{unidadeDeSaudeMB.alterarUnidade}"
								update=":messages :cadastroForm :listagemForm"
								styleClass="ui-button-success" />
						</div>
					</p:dialog>

					<p:confirmPopup global="true">
						<p:commandButton value="Cancelar"
							type="button"
							styleClass="ui-confirm-popup-no ui-button-flat" />
						<p:commandButton value="Remover"
							type="button"
							styleClass="ui-confirm-popup-yes ui-button-danger"
							process="@this" />
					</p:confirmPopup>
				</h:form>
			</p:card>
		</section>
	</ui:define>
</ui:composition>
